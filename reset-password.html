<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopWriter AI — Новый пароль</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --surface: #161410;
    --surface2: #1e1b16;
    --surface3: #262219;
    --amber: #e8a020;
    --amber-light: #ffc84a;
    --amber-dim: #3a2800;
    --cream: #f5f0e8;
    --text-muted: #7a7060;
    --border: rgba(232,160,32,0.18);
    --red: #e85520;
    --green: #20c87a;
    --ink: #0d0d0d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--surface);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* grain */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0; opacity:.6;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
  }

  .logo {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--amber);
    letter-spacing: -0.02em;
    margin-bottom: 32px;
    display: block;
    text-decoration: none;
  }
  .logo span { color: var(--cream); }

  h1 {
    font-family: 'Inter', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 8px;
  }
  .sub {
    color: var(--text-muted);
    font-size: .9rem;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: .75rem;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(232,160,32,0.1);
  }

  .strength-bar {
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .3s, background .3s;
    width: 0%;
  }
  .strength-label {
    font-size: .75rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .btn {
    width: 100%;
    background: var(--amber);
    color: var(--ink);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background .2s, transform .1s;
    letter-spacing: -0.01em;
  }
  .btn:hover { background: var(--amber-light); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: .9rem;
    display: none;
  }
  .msg.error { background: rgba(232,85,32,0.1); border: 1px solid rgba(232,85,32,0.3); color: #ff8060; }
  .msg.success { background: rgba(32,200,122,0.1); border: 1px solid rgba(32,200,122,0.3); color: var(--green); }

  /* success state */
  .success-state {
    display: none;
    text-align: center;
  }
  .success-icon {
    width: 64px; height: 64px;
    background: rgba(232,160,32,0.15);
    border: 2px solid var(--amber);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 1.8rem;
  }
  .success-state h2 {
    font-family: 'Inter', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .success-state p {
    color: var(--text-muted);
    font-size: .9rem;
    margin-bottom: 24px;
  }
  .btn-home {
    display: inline-block;
    background: var(--amber);
    color: var(--ink);
    text-decoration: none;
    padding: 12px 32px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: .95rem;
    transition: background .2s;
  }
  .btn-home:hover { background: var(--amber-light); }

  /* error state */
  .error-state {
    display: none;
    text-align: center;
  }
  .error-state h2 {
    font-family: 'Inter', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: #ff8060;
    margin-bottom: 8px;
  }
  .error-state p {
    color: var(--text-muted);
    font-size: .9rem;
    margin-bottom: 24px;
  }
</style>
</head>
<body>
<div class="card">
  <a href="https://shopwriter.ru" class="logo">Shop<span>Writer</span></a>

  <!-- FORM STATE -->
  <div id="formState">
    <h1>Новый пароль</h1>
    <p class="sub">Придумайте надёжный пароль для вашего аккаунта</p>

    <div class="field">
      <label>Новый пароль</label>
      <input type="password" id="newPass" placeholder="Минимум 6 символов" oninput="checkStrength()" />
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="field">
      <label>Повторите пароль</label>
      <input type="password" id="confirmPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')savePassword()" />
    </div>

    <button class="btn" id="saveBtn" onclick="savePassword()">Сохранить пароль</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- SUCCESS STATE -->
  <div class="success-state" id="successState">
    <div class="success-icon">✓</div>
    <h2>Пароль изменён!</h2>
    <p>Теперь вы можете войти в аккаунт с новым паролем</p>
    <a href="https://shopwriter.ru" class="btn-home">Перейти на сайт</a>
  </div>

  <!-- ERROR STATE -->
  <div class="error-state" id="errorState">
    <div class="success-icon" style="border-color:#ff8060;background:rgba(232,85,32,0.1)">✕</div>
    <h2>Ссылка недействительна</h2>
    <p>Ссылка для сброса пароля устарела или уже использована. Запросите новую.</p>
    <a href="https://shopwriter.ru" class="btn-home">На главную</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://bqlednvydstcyggwdssa.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxbGVkbnZ5ZHN0Y3lnZ3dkc3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzY4NDAsImV4cCI6MjA4ODgxMjg0MH0.LEHkwtvgY7rVH7aXc_SFfNvqrayQOE-bw_-5griXVFA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let recoveryToken = null;

// Получаем токен из URL
async function init() {
  // Supabase передаёт токен через hash или через onAuthStateChange
  const { data, error } = await sb.auth.getSession();

  // Проверяем тип события через URL hash
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', ''));
  const type = params.get('type');
  const accessToken = params.get('access_token');

  if (type === 'recovery' && accessToken) {
    // Устанавливаем сессию из токена
    const { data: sessionData, error: sessionError } = await sb.auth.setSession({
      access_token: accessToken,
      refresh_token: params.get('refresh_token') || ''
    });
    if (sessionError) {
      showError();
      return;
    }
    recoveryToken = accessToken;
    document.getElementById('formState').style.display = 'block';
  } else if (data?.session) {
    recoveryToken = data.session.access_token;
    document.getElementById('formState').style.display = 'block';
  } else {
    showError();
  }
}

function showError() {
  document.getElementById('formState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
}

function checkStrength() {
  const val = document.getElementById('newPass').value;
  const fill = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  if (!val) { fill.style.width = '0%'; label.textContent = ''; return; }
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w: '20%', c: '#e85520', t: 'Слабый' },
    { w: '40%', c: '#e87020', t: 'Слабый' },
    { w: '60%', c: '#e8a020', t: 'Средний' },
    { w: '80%', c: '#a0c820', t: 'Хороший' },
    { w: '100%', c: '#20c87a', t: 'Надёжный' },
  ];
  const lvl = levels[Math.min(score, 4)];
  fill.style.width = lvl.w;
  fill.style.background = lvl.c;
  label.textContent = lvl.t;
  label.style.color = lvl.c;
}

async function savePassword() {
  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('saveBtn');

  msg.style.display = 'none';

  if (!newPass || newPass.length < 6) {
    msg.textContent = 'Пароль должен быть минимум 6 символов';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }
  if (newPass !== confirmPass) {
    msg.textContent = 'Пароли не совпадают';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Сохраняем...';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'update_password',
        newPassword: newPass,
        token: recoveryToken
      })
    });
    const data = await res.json();

    if (data.error) {
      msg.textContent = 'Ошибка: ' + (data.error.message || 'попробуйте ещё раз');
      msg.className = 'msg error';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Сохранить пароль';
    } else {
      document.getElementById('formState').style.display = 'none';
      document.getElementById('successState').style.display = 'block';
    }
  } catch(e) {
    msg.textContent = 'Ошибка соединения';
    msg.className = 'msg error';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Сохранить пароль';
  }
}

init();
</script>
</body>
</html>
